# Basic settings
set -g history-limit 50000
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Improve colors
set -g default-terminal "screen-256color"

# Vi mode for copy-paste
setw -g mode-keys vi

# SSH agent forwarding - update SSH_AUTH_SOCK on session attach
set -g update-environment -r
setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock

# Clipboard integration using xsel (xfce4-terminal doesn't support OSC 52)
set -g set-clipboard off

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel -i -p"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Auto-copy selection to primary selection with mouse (X-like behavior)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel -i -p"

# Easier pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Display pane numbers longer
set -g display-panes-time 2000

# Status bar styling
set -g status-style bg=color235,fg=white
set -g status-left-length 30
set -g status-right-length 60
set -g status-left '[#S] '
set -g status-right '#[fg=yellow]#(whoami)@#H #[fg=green]%Y-%m-%d %H:%M'

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Window status
setw -g window-status-current-style bg=blue,fg=white,bold
